# Overfit Test: 32 training samples, val=subset of train
# Purpose: More stable BatchNorm stats while still testing overfitting

device: cuda
seed: 42

# Data - 32 train, 4 val (subset of train)
data:
  data_dir: train_data
  split_file: train_data/splits_overfit_32.json
  max_train_samples: null
  max_val_samples: 4
  fix_pose: true
  fix_pose_high_rmsd: true
  position_noise_scale: 0.1
  num_workers: 4
  loading_mode: lazy
  timestep_sampling:
    method: uniform
    mu: 0.8
    sigma: 1.7
    num_timesteps_per_sample: 1

# Model
model:
  architecture: joint
  protein_input_scalar_dim: 76
  protein_input_vector_dim: 31
  protein_input_edge_scalar_dim: 39
  protein_input_edge_vector_dim: 8
  ligand_input_scalar_dim: 122
  ligand_input_edge_scalar_dim: 44
  hidden_scalar_dim: 128
  hidden_vector_dim: 32
  hidden_edge_dim: 128
  joint_num_layers: 6
  cross_edge_distance_cutoff: 6.0
  cross_edge_max_neighbors: 16
  cross_edge_num_rbf: 32
  intra_edge_distance_cutoff: 6.0
  intra_edge_max_neighbors: 16
  hidden_dim: 256
  esm_proj_dim: 128
  self_conditioning: true
  dropout: 0.0

# Training
training:
  num_epochs: 500
  batch_size: 16              # Larger batch for BatchNorm stability
  val_batch_size: 4
  gradient_clip: 100.0
  gradient_accumulation_steps: 1
  distance_geometry_weight: 0.1
  ema:
    enabled: false
    decay: 0.999
  compile: false

  protein_ligand_clash:
    enabled: false
    ca_threshold: 3.0
    sc_threshold: 2.5
    margin: 1.0
    weight: 0.2

  optimizer:
    type: muon
    muon:
      lr: 0.02
      momentum: 0.95
      weight_decay: 0.0
      min_lr: 0.002
    adamw:
      lr: 0.0003
      weight_decay: 0.0
      betas: [0.9, 0.999]
      eps: 1.0e-08
      min_lr: 0.00003

  schedule:
    warmup_fraction: 0.05
    plateau_fraction: 0.80
    decay_fraction: 0.15
    warmup_epochs: 5

  validation:
    frequency: 50
    early_stopping_patience: 1000

# Sampling
sampling:
  num_steps: 20
  method: euler
  schedule: uniform
  t_end: 1.0

# Experiment
experiment:
  base_dir: save

# Checkpoints
checkpoint:
  save_freq: 50
  save_latest: true
  keep_last_n: 3

# Visualization
visualization:
  enabled: true
  save_animation: true
  animation_fps: 10
  num_samples: 1

# WandB
wandb:
  enabled: true
  project: "protein-ligand-flowfix"
  entity: null
  name: "overfit-test-high-rmsd"
  tags: ["high-rmsd", "overfit-test", "batchnorm-fix", "fixed-edges"]
  log_gradients: false
  log_model_weights: false
  log_animations: true
