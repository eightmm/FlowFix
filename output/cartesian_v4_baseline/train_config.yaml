data:
  data_dir: train_data
  split_file: train_data/splits.json
  max_train_samples: null
  max_val_samples: null
  fix_pose: false
  fix_pose_high_rmsd: false
  position_noise_scale: 0.05
  num_workers: 4
  loading_mode: lazy
  timestep_sampling:
    method: uniform
    mu: 0.8
    sigma: 1.7
    num_timesteps_per_sample: 2
model:
  architecture: joint
  protein_input_scalar_dim: 76
  protein_input_vector_dim: 31
  protein_input_edge_scalar_dim: 39
  protein_input_edge_vector_dim: 8
  ligand_input_scalar_dim: 122
  ligand_input_edge_scalar_dim: 44
  hidden_scalar_dim: 192
  hidden_vector_dim: 48
  hidden_edge_dim: 192
  joint_num_layers: 8
  cross_edge_distance_cutoff: 6.0
  cross_edge_max_neighbors: 16
  cross_edge_num_rbf: 32
  intra_edge_distance_cutoff: 6.0
  intra_edge_max_neighbors: 16
  hidden_dim: 384
  esm_proj_dim: 128
  self_conditioning: false
  dropout: 0.1
training:
  num_epochs: 500
  batch_size: 32
  val_batch_size: 32
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  distance_geometry_weight: 0.1
  ema:
    enabled: true
    decay: 0.999
  compile: false
  optimizer:
    type: adamw
    adamw:
      lr: 0.0001
      weight_decay: 0.0001
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
      min_lr: 1.0e-06
  schedule:
    warmup_fraction: 0.05
    plateau_fraction: 0.8
    decay_fraction: 0.15
    warmup_epochs: 5
  validation:
    frequency: 20
    early_stopping_patience: 50
sampling:
  num_steps: 20
  method: euler
  schedule: uniform
  t_end: 1.0
experiment:
  base_dir: save
checkpoint:
  save_freq: 5
  save_latest: true
  keep_last_n: 5
visualization:
  enabled: true
  save_animation: false
  animation_fps: 10
  num_samples: 4
wandb:
  enabled: true
  project: protein-ligand-flowfix
  name: rectified-flow-full-v4
  tags:
  - full-train
  - rectified-flow
  - stable
  log_gradients: false
  log_model_weights: false
  log_animations: true
